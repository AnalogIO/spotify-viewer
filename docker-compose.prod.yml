services:
  postgres:
    container_name: spotify-postgres
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: spotify_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    container_name: spotify-viewer
    image: ghcr.io/rustic-beans/spotify-viewer:latest
    depends_on:
      - postgres
    volumes:
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped

  caddy:
    container_name: spotify-caddy
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
